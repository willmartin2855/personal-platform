<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{.RepoName}}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0d1117;
      color: #e6edf3;
    }
    .card {
      text-align: center;
      padding: 3rem 4rem;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: #161b22;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p  { color: #8b949e; font-size: 0.95rem; }
    .badge {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.3rem 0.8rem;
      background: #238636;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>{{.RepoName}}</h1>
    <p>Deployed via GitHub Actions · personal-platform CLI</p>
    <span class="badge">&#10003; live</span>
  </div>
</body>
</html>
